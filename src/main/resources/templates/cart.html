<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your Cart — Bakers.in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container cart-page">
    <h1>Your cart</h1>

    <div th:if="${cart.items.isEmpty()}" class="empty-state">
        <p>🛒 Your cart is empty. Time to treat yourself!</p>
        <a href="/products" class="btn btn-primary">Browse the menu</a>
    </div>

    <div class="cart-layout" th:unless="${cart.items.isEmpty()}">
        <div class="cart-items">
            <div class="cart-item" th:each="item : ${cart.items}">
                <img th:src="${item.product.imageUrl}" th:alt="${item.product.name}"/>
                <div class="cart-item-info">
                    <a th:href="@{/product/{id}(id=${item.product.id})}" th:text="${item.product.name}">Product</a>
                    <span class="cart-item-unit" th:text="${item.product.unit}">per piece</span>
                    <span class="cart-item-price" th:text="'₹' + ${#numbers.formatDecimal(item.product.finalPrice, 1, 'COMMA', 0, 'POINT')} + ' each'">₹199 each</span>
                </div>
                <form th:action="@{/cart/update}" method="post" class="qty-form">
                    <input type="hidden" name="productId" th:value="${item.product.id}"/>
                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="20" onchange="this.form.submit()"/>
                </form>
                <span class="cart-item-total" th:text="'₹' + ${#numbers.formatDecimal(item.lineTotal, 1, 'COMMA', 0, 'POINT')}">₹398</span>
                <form th:action="@{/cart/remove}" method="post">
                    <input type="hidden" name="productId" th:value="${item.product.id}"/>
                    <button type="submit" class="btn-remove" title="Remove">✕</button>
                </form>
            </div>
        </div>

        <aside class="cart-summary">
            <h2>Order summary</h2>
            <div class="summary-row"><span>Subtotal</span><span th:text="'₹' + ${#numbers.formatDecimal(cart.subtotal, 1, 'COMMA', 0, 'POINT')}">₹0</span></div>
            <div class="summary-row"><span>Delivery</span>
                <span th:text="${deliveryFee.compareTo(T(java.math.BigDecimal).ZERO) == 0} ? 'FREE' : '₹' + ${#numbers.formatDecimal(deliveryFee, 1, 'COMMA', 0, 'POINT')}">FREE</span>
            </div>
            <p class="free-delivery-note" th:if="${deliveryFee.compareTo(T(java.math.BigDecimal).ZERO) > 0}">
                Add <strong th:text="'₹' + ${#numbers.formatDecimal(freeDeliveryThreshold.subtract(cart.subtotal), 1, 'COMMA', 0, 'POINT')}">₹0</strong> more for free delivery!
            </p>
            <div class="summary-row summary-total"><span>Total</span><span th:text="'₹' + ${#numbers.formatDecimal(grandTotal, 1, 'COMMA', 0, 'POINT')}">₹0</span></div>
            <a href="/checkout" class="btn btn-primary btn-block">Proceed to checkout</a>
            <a href="/products" class="btn btn-ghost btn-block">Continue browsing</a>
        </aside>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
