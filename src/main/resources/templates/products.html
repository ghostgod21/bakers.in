<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — Bakers.in'">Bakers.in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container listing-page">
    <div class="listing-header" th:style="${currentCategory != null} ? ('--accent:' + ${currentCategory.accentColor}) : ''">
        <span class="listing-icon" th:if="${currentCategory != null}" th:text="${currentCategory.icon}">🍰</span>
        <div>
            <h1 th:text="${pageTitle}">Menu</h1>
            <p th:if="${currentCategory != null}" th:text="${currentCategory.description}">Category description</p>
            <p th:if="${currentCategory == null and query == null}">Everything we bake, grill, fry and shake — all in one place.</p>
            <p th:if="${query != null}" th:text="${products.size()} + ' result(s) found'">0 results</p>
        </div>
    </div>

    <div class="listing-layout">
        <aside class="category-sidebar">
            <h3>Categories</h3>
            <ul>
                <li><a href="/products" th:classappend="${currentCategory == null and query == null} ? 'active'">🍽️ All items</a></li>
                <li th:each="cat : ${categories}">
                    <a th:href="@{/category/{slug}(slug=${cat.slug})}"
                       th:classappend="${currentCategory != null and currentCategory.slug == cat.slug} ? 'active'"
                       th:text="${cat.icon + ' ' + cat.name}">Category</a>
                </li>
            </ul>
        </aside>

        <section class="product-grid">
            <div th:if="${products.isEmpty()}" class="empty-state">
                <p>😕 No items found. Try a different search or browse a category.</p>
            </div>
            <div th:each="p : ${products}" th:replace="~{fragments/product-card :: card(${p})}"></div>
        </section>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
