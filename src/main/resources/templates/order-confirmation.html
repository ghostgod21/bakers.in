<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Confirmed — Bakers.in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container confirmation-page">
    <div class="confirmation-card">
        <span class="confirmation-icon">🎉</span>
        <h1>Order placed!</h1>
        <p>Thanks, <strong th:text="${order.customerName}">Customer</strong> — your order is being prepared with love.</p>
        <div class="order-number">Order #<span th:text="${order.orderNumber}">BAK-XXXXXXXX</span></div>

        <div class="confirmation-details">
            <div th:each="item : ${order.items}" class="summary-item">
                <span th:text="${item.quantity} + '× ' + ${item.productName}">1× Item</span>
                <span th:text="'₹' + ${#numbers.formatDecimal(item.lineTotal, 1, 'COMMA', 0, 'POINT')}">₹0</span>
            </div>
            <hr/>
            <div class="summary-row summary-total"><span>Total paid (on delivery)</span>
                <span th:text="'₹' + ${#numbers.formatDecimal(order.total, 1, 'COMMA', 0, 'POINT')}">₹0</span></div>
        </div>

        <div class="confirmation-meta">
            <p>📍 Delivering to <span th:text="${order.address} + ', ' + ${order.city} + ' - ' + ${order.zip}">Address</span></p>
            <p>💳 Payment method: <span th:text="${order.paymentMethod}">COD</span></p>
        </div>

        <a href="/products" class="btn btn-primary">Order something else</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
