<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${product.name} + ' — Bakers.in'">Product — Bakers.in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container detail-page">
    <nav class="breadcrumb">
        <a href="/">Home</a> /
        <a th:href="@{/category/{slug}(slug=${product.category.slug})}" th:text="${product.category.name}">Category</a> /
        <span th:text="${product.name}">Product</span>
    </nav>

    <div class="detail-layout">
        <div class="detail-media">
            <img th:src="${product.imageUrl}" th:alt="${product.name}"/>
            <span class="veg-dot large" th:classappend="${product.veg} ? 'veg' : 'nonveg'"></span>
            <span class="sale-badge" th:if="${product.onSale}" th:text="${product.discountPercent + '% OFF'}">10% OFF</span>
        </div>

        <div class="detail-info">
            <span class="detail-category" th:text="${product.category.icon + ' ' + product.category.name}">Category</span>
            <h1 th:text="${product.name}">Product name</h1>
            <div class="product-rating">⭐ <span th:text="${product.rating}">4.5</span> &middot; <span th:text="${product.stock}">10</span> in stock</div>
            <p class="detail-description" th:text="${product.description}">Description</p>

            <div class="detail-price-row">
                <span class="price-final large" th:text="'₹' + ${#numbers.formatDecimal(product.finalPrice, 1, 'COMMA', 0, 'POINT')}">₹199</span>
                <span class="price-original" th:if="${product.onSale}" th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}">₹249</span>
                <span class="price-unit" th:text="${product.unit}">per piece</span>
            </div>

            <form th:action="@{/cart/add}" method="post" class="add-to-cart-form-detail">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <label for="qty">Quantity</label>
                <input type="number" id="qty" name="quantity" value="1" min="1" max="20"/>
                <button type="submit" class="btn btn-primary">Add to cart 🛒</button>
            </form>

            <ul class="detail-perks">
                <li>🚚 Free delivery on orders above ₹499</li>
                <li>🧊 Made fresh to order, never frozen</li>
                <li>↩️ Not satisfied? Call us within 30 minutes of delivery</li>
            </ul>
        </div>
    </div>

    <section class="related-section" th:if="${related != null and !related.isEmpty()}">
        <h2 class="section-title">You might also like</h2>
        <div class="product-grid">
            <div th:each="p : ${related}" th:replace="~{fragments/product-card :: card(${p})}"></div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
