<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Checkout — Bakers.in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container checkout-page">
    <h1>Checkout</h1>

    <div class="checkout-layout">
        <form th:action="@{/checkout}" method="post" class="checkout-form">
            <h2>Delivery details</h2>

            <label for="customerName">Full name</label>
            <input type="text" id="customerName" name="customerName" required/>

            <div class="form-row">
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required/>
                </div>
                <div>
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10-digit mobile number" required/>
                </div>
            </div>

            <label for="address">Address</label>
            <textarea id="address" name="address" rows="3" required></textarea>

            <div class="form-row">
                <div>
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" required/>
                </div>
                <div>
                    <label for="zip">PIN code</label>
                    <input type="text" id="zip" name="zip" pattern="[0-9]{6}" required/>
                </div>
            </div>

            <h2>Payment method</h2>
            <div class="payment-options">
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="Cash on Delivery" checked/>
                    <span>💵 Cash on Delivery</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="UPI"/>
                    <span>📱 UPI</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="Card"/>
                    <span>💳 Card</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Place order</button>
        </form>

        <aside class="cart-summary">
            <h2>Order summary</h2>
            <div class="summary-item" th:each="item : ${cart.items}">
                <span th:text="${item.quantity} + '× ' + ${item.product.name}">1× Item</span>
                <span th:text="'₹' + ${#numbers.formatDecimal(item.lineTotal, 1, 'COMMA', 0, 'POINT')}">₹0</span>
            </div>
            <hr/>
            <div class="summary-row"><span>Subtotal</span><span th:text="'₹' + ${#numbers.formatDecimal(cart.subtotal, 1, 'COMMA', 0, 'POINT')}">₹0</span></div>
            <div class="summary-row"><span>Delivery</span>
                <span th:text="${deliveryFee.compareTo(T(java.math.BigDecimal).ZERO) == 0} ? 'FREE' : '₹' + ${#numbers.formatDecimal(deliveryFee, 1, 'COMMA', 0, 'POINT')}">FREE</span>
            </div>
            <div class="summary-row summary-total"><span>Total</span><span th:text="'₹' + ${#numbers.formatDecimal(grandTotal, 1, 'COMMA', 0, 'POINT')}">₹0</span></div>
        </aside>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
